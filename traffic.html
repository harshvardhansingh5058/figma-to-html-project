<!DOCTYPE html>
<html>
<body>

<h2></h2>

<script>
  let color = prompt("Enter traffic light color:");

  color = color.trim();

  let h2 = document.querySelector("h2");

  if (color === "red") {
    h2.innerText = "STOP";
  } else if (color === "yellow") {
    h2.innerText = "WAIT";
  } else if (color === "green") {
    h2.innerText = "GO";
  } else {
    h2.innerText = "Invalid input";
  }
</script>

</body>
</html>
